<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../../styles.css">
<style>
  body { margin: 0; background: var(--paper-000); padding: 28px; }
</style>
</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<script type="text/babel">
  const { Field, Button } = window.NFCDDesignSystem_1d3b67;
  function Demo() {
    const [n, setN] = React.useState("");
    return (
      <div style={{display:"grid", gridTemplateColumns:"1fr 1fr", gap:18, alignItems:"start"}}>
        <Field label="Nombre" placeholder="Tu nombre" value={n} onChange={e=>setN(e.target.value)} />
        <Field label="Correo" type="email" placeholder="vos@ejemplo.com" hint="No compartimos tu correo." />
        <div style={{gridColumn:"1 / -1"}}>
          <Field label="Mensaje" multiline rows={3} placeholder="Contanos qué te interesa…" />
        </div>
        <div style={{gridColumn:"1 / -1"}}>
          <Button variant="solid">Enviar inscripción</Button>
        </div>
      </div>
    );
  }
  ReactDOM.createRoot(document.getElementById("root")).render(<Demo />);
</script>
</body>
</html>
