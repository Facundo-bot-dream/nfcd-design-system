<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<!-- @template name="Social poster — Encuentro" description="Square 1080×1080 announcement post for an NFCD encuentro: graphite motif, Amatic title, mono details." -->
<helmet>
<script src="./ds-base.js"></script>
</helmet>
<div style="width:1080px;height:1080px;background:#fbf9f5;position:relative;overflow:hidden;font-family:'Book Antiqua',Palatino,Georgia,serif;display:flex;flex-direction:column;">

  <!-- motif -->
  <img src="../../assets/logos/nfcd_logo_alpha_light.png" alt="Costillar y mariposa" style="position:absolute;top:-40px;right:-60px;width:620px;mix-blend-mode:multiply;opacity:0.9;pointer-events:none;" />

  <!-- top bar -->
  <div style="display:flex;align-items:center;justify-content:space-between;padding:64px 72px 0;position:relative;z-index:2;">
    <img src="../../assets/logos/nfcd_isologov2_color_fondotrasparente.png" alt="NFCD" style="height:64px;" />
    <span style="font-family:'Letter Gothic Std','Courier New',monospace;font-size:18px;letter-spacing:0.22em;text-transform:uppercase;color:#5c534c;">Bariloche</span>
  </div>

  <!-- title block -->
  <div style="margin-top:auto;padding:0 72px 84px;position:relative;z-index:2;">
    <div style="font-family:'Letter Gothic Std','Courier New',monospace;font-size:22px;letter-spacing:0.24em;text-transform:uppercase;color:#a7274c;">Encuentro · Otoño 2026</div>
    <div style="width:64px;height:3px;background:#a7274c;margin:22px 0 26px;"></div>
    <h1 style="font-family:'Amatic SC',cursive;font-weight:700;font-size:168px;line-height:0.86;letter-spacing:0.03em;text-transform:uppercase;color:#1a1614;margin:0;">El cuerpo<br>que escucha</h1>
    <p style="font-size:30px;line-height:1.5;color:#2c2724;max-width:24ch;margin:30px 0 0;">Tres encuentros de práctica somática y danza en el Campo Arroyo del Medio.</p>
  </div>

  <!-- footer strip -->
  <div style="background:#1a1614;color:#fbf9f5;padding:30px 72px;display:flex;align-items:center;justify-content:space-between;position:relative;z-index:2;font-family:'Letter Gothic Std','Courier New',monospace;font-size:20px;letter-spacing:0.14em;text-transform:uppercase;">
    <span>12 · 19 · 26 Abril</span>
    <span style="color:#df97ac;">Inscripción abierta</span>
  </div>
</div>
</x-dc>
</body>
</html>
