<!-- @dsCard group="Brand" viewport="700x150" name="Eyebrow & wordmark voice" subtitle="Wide-tracked uppercase mono labels mirror the logo's spacing." -->
<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; background: var(--paper-000); padding: 26px; display: flex; flex-direction: column; gap: 16px; }
  .eyebrow { font-family: var(--font-mono); font-size: 12px; letter-spacing: 0.22em; text-transform: uppercase; color: var(--wine-600); }
  .eyebrow.ink { color: var(--ink-700); }
  .rule { height: 1px; background: var(--rule-ink); width: 48px; }
  .ttl { font-family: var(--font-display); font-weight: 700; font-size: 40px; letter-spacing: 0.06em; text-transform: uppercase; color: var(--ink-900); margin: 0; line-height: 1; }
</style>
</head>
<body>
  <div class="eyebrow">Encuentro · Otoño 2026</div>
  <div class="rule"></div>
  <h2 class="ttl">El cuerpo que escucha</h2>
  <div class="eyebrow ink">Campo Arroyo del Medio — Bariloche · Patagonia</div>
</body>
</html>
