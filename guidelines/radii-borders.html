<!-- @dsCard group="Spacing" viewport="700x160" name="Radii & borders" subtitle="Near-square corners; hairline ink rules. Pills reserved for tags." -->
<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; background: var(--paper-000); padding: 24px 26px; font-family: var(--font-mono); }
  .row { display: flex; gap: 18px; align-items: center; }
  .item { display: flex; flex-direction: column; align-items: center; gap: 8px; }
  .box { width: 64px; height: 56px; background: var(--paper-pure); border: 1.5px solid var(--ink-800); }
  .item span { font-size: 10px; color: var(--text-muted); letter-spacing: 0.04em; }
  .pill { width: 84px; height: 32px; border-radius: var(--radius-pill); background: var(--wine-100); border: 1px solid var(--wine-300); }
</style>
</head>
<body>
  <div class="row">
    <div class="item"><div class="box" style="border-radius:var(--radius-none)"></div><span>none · 0</span></div>
    <div class="item"><div class="box" style="border-radius:var(--radius-xs)"></div><span>xs · 2</span></div>
    <div class="item"><div class="box" style="border-radius:var(--radius-sm)"></div><span>sm · 4</span></div>
    <div class="item"><div class="box" style="border-radius:var(--radius-md)"></div><span>md · 6</span></div>
    <div class="item"><div class="pill"></div><span>pill · tags</span></div>
    <div class="item"><div class="box" style="border:0;border-top:1px solid var(--border-hair);width:64px;height:0"></div><span>hair · 1px</span></div>
    <div class="item"><div class="box" style="border:0;border-top:2px solid var(--rule-ink);width:64px;height:0"></div><span>rule · ink</span></div>
  </div>
</body>
</html>
