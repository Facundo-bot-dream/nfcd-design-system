<!-- @dsCard group="Colors" viewport="700x150" name="Paper — warm grounds" subtitle="Bone-white page tones; the system sits on warm paper, not stark white." -->
<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; background: var(--ink-900); font-family: var(--font-mono); }
  .row { display: flex; padding: 22px; gap: 10px; }
  .sw { flex: 1; height: 96px; border-radius: var(--radius-sm); display: flex; align-items: flex-end; padding: 8px; box-sizing: border-box; border: 1px solid rgba(255,255,255,0.12); }
  .sw span { font-size: 10px; letter-spacing: 0.04em; color: var(--ink-700); }
  .lbl { font-size: 11px; color: var(--ink-300); padding: 0 22px; letter-spacing: 0.12em; text-transform: uppercase; }
</style>
</head>
<body>
  <div class="row">
    <div class="sw" style="background:var(--paper-pure)"><span>pure #fff</span></div>
    <div class="sw" style="background:var(--paper-000)"><span>000 page</span></div>
    <div class="sw" style="background:var(--paper-100)"><span>100 card</span></div>
    <div class="sw" style="background:var(--paper-200)"><span>200 sunk</span></div>
    <div class="sw" style="background:var(--paper-300)"><span>300</span></div>
  </div>
  <div class="lbl">--surface-page · #fbf9f5 · warm bone white</div>
</body>
</html>
