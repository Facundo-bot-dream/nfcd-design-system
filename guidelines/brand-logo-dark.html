<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; background: var(--ink-900); padding: 24px; display: flex; gap: 36px; align-items: center; justify-content: center; }
  .item { display: flex; flex-direction: column; align-items: center; gap: 14px; }
  .cap { font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--ink-400); }
</style>
</head>
<body>
  <div class="item">
    <img src="../assets/logos/nfcd_isologov1_blanco_fondotrasparente.png" alt="Isologo blanco vertical" style="height:200px">
    <span class="cap">blanco · vertical</span>
  </div>
  <div class="item">
    <img src="../assets/logos/nfcd_isologov2_blanco_fondotrasparente.png" alt="Isologo blanco horizontal" style="height:150px">
    <span class="cap">blanco · horizontal</span>
  </div>
</body>
</html>
