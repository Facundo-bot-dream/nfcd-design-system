<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; background: var(--paper-000); padding: 20px 26px; }
  .eyebrow { font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.18em; text-transform: uppercase; color: var(--text-muted); margin-bottom: 6px; }
  .big { font-family: var(--font-display); font-weight: 700; font-size: 84px; line-height: 0.95; letter-spacing: 0.04em; color: var(--ink-900); text-transform: uppercase; margin: 0; }
  .sub { font-family: var(--font-display); font-weight: 400; font-size: 40px; line-height: 1; color: var(--wine-600); margin: 4px 0 0; letter-spacing: 0.04em; }
</style>
</head>
<body>
  <div class="eyebrow">Amatic SC · --font-display · 400 / 700</div>
  <h1 class="big">Cuerpo y Danza</h1>
  <div class="sub">la fuerza que nos atraviesa</div>
</body>
</html>
