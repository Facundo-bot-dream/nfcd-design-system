<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; background: var(--paper-000); padding: 22px 26px; }
  .eyebrow { font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.18em; text-transform: uppercase; color: var(--text-muted); margin-bottom: 10px; }
  h2 { font-family: var(--font-serif); font-weight: 700; font-size: 26px; color: var(--ink-900); margin: 0 0 8px; }
  p { font-family: var(--font-serif); font-size: 16px; line-height: 1.55; color: var(--text-body); margin: 0; max-width: 60ch; }
  em { color: var(--wine-700); }
</style>
</head>
<body>
  <div class="eyebrow">Book Antiqua · --font-serif · regular · bold · italic</div>
  <h2>El cuerpo como campo de conocimiento</h2>
  <p>La danza no ilustra una idea: <em>la produce</em>. Cada práctica abre el cuerpo a las fuerzas que lo atraviesan, y en ese suceso aparece un saber que no pasa primero por las palabras.</p>
</body>
</html>
