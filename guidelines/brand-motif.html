<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; background: var(--paper-000); padding: 0; display: flex; }
  .img { flex: 1.1; background: var(--paper-100); display: flex; align-items: center; justify-content: center; padding: 20px; }
  .img img { max-height: 250px; mix-blend-mode: multiply; }
  .txt { flex: 1; padding: 26px; display: flex; flex-direction: column; justify-content: center; gap: 12px; }
  .lead { font-family: var(--font-serif); font-size: 17px; line-height: 1.5; color: var(--ink-900); margin: 0; }
  .note { font-family: var(--font-mono); font-size: 11px; letter-spacing: 0.06em; color: var(--text-muted); line-height: 1.6; margin: 0; }
</style>
</head>
<body>
  <div class="img"><img src="../assets/logos/nfcd_logo_alpha_light.png" alt="Costillar y mariposa"></div>
  <div class="txt">
    <p class="lead">Caja torácica que deviene ala de mariposa.</p>
    <p class="note">Grafito sobre papel · blanco y negro · trazo orgánico. Hueso y vuelo, estructura y transformación. Toda la imaginería del sistema deriva de este registro a lápiz.</p>
  </div>
</body>
</html>
