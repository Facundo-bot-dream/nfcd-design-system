<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; background: var(--paper-000); font-family: var(--font-mono); }
  .row { display: flex; padding: 22px; gap: 10px; }
  .sw { flex: 1; height: 96px; border-radius: var(--radius-sm); display: flex; align-items: flex-end; padding: 8px; box-sizing: border-box; }
  .sw span { font-size: 10px; letter-spacing: 0.04em; color: rgba(255,255,255,0.9); }
  .sw.lt span { color: var(--sage-700); }
  .lbl { font-size: 11px; color: var(--ink-500); padding: 0 22px; letter-spacing: 0.12em; text-transform: uppercase; }
</style>
</head>
<body>
  <div class="row">
    <div class="sw" style="background:var(--sage-700)"><span>700</span></div>
    <div class="sw" style="background:var(--sage-500)"><span>500</span></div>
    <div class="sw lt" style="background:var(--sage-300)"><span>300</span></div>
    <div class="sw lt" style="background:var(--sage-100)"><span>100</span></div>
  </div>
  <div class="lbl">--sage-500 · supporting accent · use sparingly</div>
</body>
</html>
