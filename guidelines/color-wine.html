<!-- @dsCard group="Colors" viewport="700x150" name="Wine — brand accent" subtitle="Signature wine sampled from the wordmark (#a7274c). Used sparingly." -->
<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; background: var(--paper-000); font-family: var(--font-mono); }
  .row { display: flex; padding: 22px; gap: 0; }
  .sw { flex: 1; height: 96px; border-radius: var(--radius-sm); display: flex; align-items: flex-end; padding: 8px; box-sizing: border-box; }
  .sw span { font-size: 10px; letter-spacing: 0.04em; color: rgba(255,255,255,0.85); }
  .sw.lt span { color: var(--ink-700); }
  .lbl { font-size: 11px; color: var(--ink-500); padding: 0 22px; letter-spacing: 0.12em; text-transform: uppercase; }
</style>
</head>
<body>
  <div class="row">
    <div class="sw" style="background:var(--wine-900)"><span>900</span></div>
    <div class="sw" style="background:var(--wine-800)"><span>800</span></div>
    <div class="sw" style="background:var(--wine-700)"><span>700</span></div>
    <div class="sw" style="background:var(--wine-600);outline:2px solid var(--ink-900);outline-offset:2px"><span>600 ★</span></div>
    <div class="sw" style="background:var(--wine-500)"><span>500</span></div>
    <div class="sw" style="background:var(--wine-400)"><span>400</span></div>
    <div class="sw lt" style="background:var(--wine-300)"><span>300</span></div>
    <div class="sw lt" style="background:var(--wine-200)"><span>200</span></div>
    <div class="sw lt" style="background:var(--wine-100)"><span>100</span></div>
    <div class="sw lt" style="background:var(--wine-050);border:1px solid var(--border-soft)"><span>050</span></div>
  </div>
  <div class="lbl">--wine-600 · #a7274c · --brand</div>
</body>
</html>
