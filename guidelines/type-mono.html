<!-- @dsCard group="Type" viewport="700x190" name="Mono — Letter Gothic Std" subtitle="Typewriter monospace for labels, metadata, course-sheet detail, captions." -->
<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; background: var(--paper-000); padding: 22px 26px; font-family: var(--font-mono); }
  .eyebrow { font-size: 10px; letter-spacing: 0.18em; text-transform: uppercase; color: var(--text-muted); margin-bottom: 12px; }
  .label { font-size: 11px; letter-spacing: 0.18em; text-transform: uppercase; color: var(--ink-900); }
  .meta { font-size: 13px; color: var(--text-body); line-height: 1.6; margin-top: 10px; }
  .meta .k { color: var(--text-faint); }
  .it { font-style: italic; color: var(--wine-700); }
</style>
</head>
<body>
  <div class="eyebrow">Letter Gothic Std · --font-mono · 400 / 700 / italic</div>
  <div class="label">Ficha de curso — 2026</div>
  <div class="meta"><span class="k">SEDE......</span> Campo Arroyo del Medio<br>
  <span class="k">DURACIÓN..</span> 3 encuentros · 12 h<br>
  <span class="k">NOTA......</span> <span class="it">cupos limitados</span></div>
</body>
</html>
